# First-draft cuRobo collision spheres for the CR5, one entry per
# collision_link_names entry in cr5.yml. Sphere centers are in each link's
# own local frame (matching cuRobo's convention), roughly proportioned
# using the joint offsets from the vendored URDF (see the origin xyz of
# joint1..joint6 in ../../robots/cr5/urdf/cr5_robot.urdf) -- NOT fit to the
# actual collision mesh geometry. Treat these as a rough placeholder to be
# tuned (e.g. with cuRobo's sphere-fitting tools) before relying on them
# for real collision avoidance.
#
# base_link's first sphere was originally `center: [0,0,0.05], radius: 0.09`
# -- spanning local z=[-0.04, 0.14], i.e. dipping 0.04m *below* the robot's
# own mount plane (local z=0). Confirmed live (table_layout.yaml's
# cr5_mount, base at world z=0.77, sitting flush on RobotPedestal, whose
# own solid body spans world z=[0, 0.776]) that this made every
# plan_single() call fail with
# `MotionGenStatus.INVALID_START_STATE_WORLD_COLLISION` -- the sphere was
# geometrically overlapping the pedestal it's mounted on, not a target-
# reachability problem. Raised to `center: [0,0,0.12]`: note this must clear
# not just local z=0 but z=0 *plus* cr5.yml's own collision_sphere_buffer
# (0.005, added to every sphere's radius at load time) *plus* margin down
# to the pedestal's actual top surface, not just the mount plane itself --
# a first attempt at `center: [0,0,0.09]` (exactly radius-tangent to local
# z=0, ignoring the buffer) still left an ~11mm sliver overlapping the
# pedestal and still failed with the same status. `[0,0,0.12]` clears the
# buffered sphere (effective radius 0.095) to world z=0.795, ~19mm above
# the pedestal's actual top (0.776).
collision_spheres:
  base_link:
    - center: [0.0, 0.0, 0.12]
      radius: 0.09
    - center: [0.0, 0.0, 0.13]
      radius: 0.08

  Link1:
    - center: [0.0, 0.0, 0.0]
      radius: 0.09

  Link2:
    - center: [0.0, 0.0, 0.0]
      radius: 0.08
    - center: [-0.21, 0.0, 0.0]
      radius: 0.075
    - center: [-0.427, 0.0, 0.0]
      radius: 0.07

  Link3:
    - center: [0.0, 0.0, 0.0]
      radius: 0.075
    - center: [-0.18, 0.0, 0.07]
      radius: 0.07
    - center: [-0.357, 0.0, 0.141]
      radius: 0.065

  Link4:
    - center: [0.0, 0.0, 0.0]
      radius: 0.06
    - center: [0.0, -0.116, 0.0]
      radius: 0.055

  Link5:
    - center: [0.0, 0.0, 0.0]
      radius: 0.055
    - center: [0.0, 0.105, 0.0]
      radius: 0.05

  Link6:
    - center: [0.0, 0.0, 0.0]
      radius: 0.05
    - center: [0.0, 0.0, 0.03]
      radius: 0.04
