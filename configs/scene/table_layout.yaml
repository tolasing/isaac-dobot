# L-shaped assembly table + CR5 mount pose.
#
# Units: meters, radians. Z-up, matching Isaac Sim's default new-stage
# convention. Consumed by scripts/build_scene.py.
#
# First draft -- dimensions are reasonable placeholders for a small
# assembly cell, not yet measured against a real table. Adjust to match
# actual hardware before treating any of this as load-bearing.

factory:
  # A real factory-floor scene (factory shell, Kuka arm, car lift, safety
  # gates, part racks) vendored from NVIDIA's USD Explorer Sample Assets
  # Pack -- not one of Isaac Sim's bundled warehouse environments. Path is
  # relative to the repo root. See assets/factory/SOURCE.md for provenance,
  # license terms, and how to re-fetch it (not committed to git -- ~404MB).
  backdrop_usd: "assets/factory/Factory.usd"
  prim_path: /World/Factory

  # Case-insensitive *prefix* match against prim names under /World/Factory
  # -- matching prims are deactivated (not deleted) by
  # scripts/build_scene.py's prune_factory_dressing(). Each entry below was
  # confirmed by selecting the actual prim in the Isaac Sim GUI (Property
  # panel's Prim Path), not guessed from SubUSDs filenames:
  #   - Rail: the welding line's sliding rail, under
  #     /World/Factory/Samples/Welding_Assembly_Animated_Adjust/.../root
  #   - RobotPedestal_ (trailing underscore, NOT the bare "RobotPedestal"):
  #     the duplicate numbered pedestals under that same root. The one bare
  #     `RobotPedestal` is deliberately excluded from this prefix match --
  #     it's reused as the CR5's own pedestal (see cr5_mount.pedestal
  #     below) instead of being deactivated.
  #   - Pedestal_plates: the flat metal plates scattered across
  #     /World/Factory/Stage that render as if floating. Deliberately NOT
  #     the bare prefix "Pedestal" -- that would also catch
  #     Pedestal_Export/Pedestal_Adjust (a separate, unconfirmed asset --
  #     possibly the "computer table" prop -- that hasn't been asked to be
  #     removed).
  # Prefix (not substring) matching deliberately avoids also catching
  # unrelated prims like a `Handrail`/`GuardRail` elsewhere in the factory.
  # Everything else (fences, feeders, process nodes, roof racks, robot
  # controllers/arms, ErgoTable, part racks, etc.) is left active.
  prune_name_startswith:
    - Rail
    - RobotPedestal_
    - Pedestal_plates

  # Exact prim paths (not name-prefix matches) to deactivate. Used instead
  # of factory.prune_name_startswith when the prim's own name is too
  # generic to safely prefix-match anywhere under /World/Factory --
  # e.g. "Link1" also names our own CR5's first arm link, and possibly
  # other robots' links elsewhere in the vendored scene.
  #   - RobotPedestal/Link1: the leftover KUKA welding-robot arm mesh still
  #     attached to the reused RobotPedestal (see cr5_mount.pedestal
  #     below) -- the pedestal is reused only as a stand; the CR5's own
  #     URDF-imported arm sits on top of it instead.
  #   - ErgoTable/Keyboard, ErgoTable/Monitor, ErgoTable/Monitor_U20__U23_2:
  #     the computer peripherals on the vendored ErgoTable desk (see
  #     ergo_tables below) -- deactivated on the source prim before it's
  #     copied, so neither copy carries them either. We only want the bare
  #     work surface for holding assembly parts.
  #   - RobotController, Roof_I10, sledge, sledge_I1: found by scanning the
  #     stage for prims with time-sampled attributes whose value actually
  #     changes (not just an authored single-keyframe export artifact) --
  #     these are the only three that survived that filter. RobotController
  #     is a second, entirely separate KUKA arm (joint axes A1-A6 plus a
  #     40-link cable-dressing chain) from the one on RobotPedestal, which
  #     visibly moves once the Isaac Sim timeline is playing. sledge/
  #     sledge_I1 are the car-body carrier fixture ("sledge"/"skid" is
  #     automotive-line terminology) -- they fake motion along the line via
  #     toggled visibility rather than real translation, which is what
  #     reads as "the car chassis moving." Roof_I10 is a roof-mounted
  #     component with animated orientation. None of this should run in a
  #     static cobot-cell backdrop.
  prune_exact_paths:
    - /World/Factory/Samples/Welding_Assembly_Animated_Adjust/Welding_Assembly_Animated_Export/root/RobotPedestal/Link1
    - /World/Factory/Samples/Welding_Assembly_Animated_Adjust/Welding_Assembly_Animated_Export/root/ErgoTable/Keyboard
    - /World/Factory/Samples/Welding_Assembly_Animated_Adjust/Welding_Assembly_Animated_Export/root/ErgoTable/Monitor
    - /World/Factory/Samples/Welding_Assembly_Animated_Adjust/Welding_Assembly_Animated_Export/root/ErgoTable/Monitor_U20__U23_2
    - /World/Factory/Samples/Welding_Assembly_Animated_Adjust/Welding_Assembly_Animated_Export/root/RobotController
    - /World/Factory/Samples/Welding_Assembly_Animated_Adjust/Welding_Assembly_Animated_Export/root/Process_U20_Node_U20__U23_5/Roof_I10
    - /World/Factory/Samples/Welding_Assembly_Animated_Adjust/Welding_Assembly_Animated_Export/sledge
    - /World/Factory/Samples/Welding_Assembly_Animated_Adjust/Welding_Assembly_Animated_Export/sledge_I1

ergo_tables:
  # Two work surfaces near the robot for holding assembly parts, reusing
  # the vendored ErgoTable desk prop instead of a synthetic table (which
  # never read as "a table" visually -- plain gray cuboids). Each instance
  # is a *copy* of source_prim_path (CopyPrim, not a world-pose override in
  # place like cr5_mount.pedestal): we need two independent instances, not
  # one repositioned original, and CopyPrim duplicates the prim's
  # composition arcs cleanly (unlike MovePrim, which left an empty shell
  # when tried on this same kind of deeply-referenced prim -- see
  # cr5_mount.pedestal's comment below for that finding).
  source_prim_path: /World/Factory/Samples/Welding_Assembly_Animated_Adjust/Welding_Assembly_Animated_Export/root/ErgoTable
  # Floor-level (z=0): ErgoTable's own origin is its floor-contact point,
  # same as RobotPedestal's. Uniform scale-down: the vendored ErgoTable's
  # native size read as oversized next to the robot/pedestal.
  scale: [0.1, 0.1, 0.1]
  # position_xy is WORLD position (meters) -- NOT the same number as the
  # Property panel's local Translate field. /World/Factory carries an
  # implicit x100 scale (it directly references the vendored Factory.usd,
  # authored in centimeters, reconciled into this stage's meters
  # convention), so a prim's local Translate relative to it reads 100x its
  # world position -- confirmed empirically: setting world position to
  # (226.912, -328.71) produced a local Translate of (22691.2, -32871.0)
  # in the Property panel. These position_xy values are already divided by
  # 100 from the raw Property panel numbers for that reason.
  # orientation_wxyz is unaffected (rotation is scale-invariant) -- Euler
  # XYZ degrees from the Property panel's Orient field, converted to
  # quaternion via isaacsim.core.utils.rotations.euler_angles_to_quat.
  instances:
    - prim_path: /World/Factory/ErgoTable_1
      position_xy: [2.26912, -3.2871]  # Property panel local Translate (22691.2, -32871.0) / 100
      orientation_wxyz: [0.7117931640756937, 0.0, 0.0, -0.7023891311624295]  # Euler XYZ (0, 0, -89.238deg)
    - prim_path: /World/Factory/ErgoTable_2
      position_xy: [1.51329, -2.1244]  # Property panel local Translate (15132.9, -21244.0) / 100
      orientation_wxyz: [1.0, 0.0, 0.0, 0.0]  # Euler (0, 0, 0deg) -- identity

cr5_mount:
  prim_path: /World/CR5
  # World pose (parent /World has an identity transform, so world = local
  # here) -- dialed in interactively in the GUI, no longer tied to the
  # ergo tables/pedestal positions (see pedestal's own comment below: it's
  # now placed independently too).
  position: [1.45, -3.34, 0.77]
  # Identity orientation (w, x, y, z); rotate here if the base needs to
  # face a particular direction relative to the table segments.
  orientation_wxyz: [1.0, 0.0, 0.0, 0.0]
  # Non-uniform -- heads up: this scales the whole articulated chain,
  # including joint offsets between links, not just each link's mesh.
  # Worth checking visually in the GUI; anisotropic scale on a multi-link
  # articulation can look distorted and PhysX doesn't always handle it
  # cleanly on rigid bodies.
  scale: [1.0, 1.0, 1.0]

  # Without a pedestal underneath, the CR5 renders floating in place --
  # URDF import with fix_base=True just pins the base at `position` with
  # nothing underneath it. Rather than author a new synthetic stand, reuse
  # the vendored `RobotPedestal` prim from the welding line (excluded from
  # factory.prune_name_startswith above for this purpose). Overriding pose
  # in place, NOT by moving/renaming the prim: RobotPedestal's actual mesh
  # comes from nested `reference` composition arcs several levels deep in
  # the vendored asset, and MovePrim on a prim like that leaves an empty
  # shell behind (confirmed: the moved prim showed 0 children).
  pedestal:
    prim_path: /World/Factory/Samples/Welding_Assembly_Animated_Adjust/Welding_Assembly_Animated_Export/root/RobotPedestal
    # LOCAL pose (not world -- unlike cr5_mount.position above), since
    # RobotPedestal's parent chain has a large internal offset baked into
    # the vendored asset (e.g. a sibling prim, Rail, sits at local
    # Translate X=-11000). Dialed in interactively in the GUI and read
    # back from the Property panel's Translate/Orient directly -- applied
    # via SingleXFormPrim.set_local_pose(), NOT set_world_pose(), which
    # would instead compute a *different* local transform needed to reach
    # this number as a world position (wrong -- these values already
    # *are* local). No longer derived from cr5_mount.position -- the
    # pedestal is now positioned independently.
    local_translation: [8222.12, 345.67, 0.0]
    local_orientation_wxyz: [0.7071067811865475, 0.0, 0.0, 0.7071067811865475]  # Euler XYZ (0, 0, 90deg)
    # Non-uniform scale-down: at native size the pedestal read as oversized
    # next to the now-shrunk (0.1x) ergo tables. Not an articulated body
    # like cr5_mount's robot, so anisotropic scale here is safe -- it's a
    # single static mesh reference, no joint chain to distort.
    scale: [0.5, 0.5, 0.8]

  # Explicitly (re-)authored directly on each joint's angular UsdPhysics.DriveAPI
  # after import (see import_cr5()'s own docstring) -- NOT the same knob as
  # robot_override.default_drive_strength/default_position_drive_damping below,
  # and only wired up for this (real CR5, non-override) branch. Confirmed live
  # that import_cr5()'s default_drive_strength=1e5/default_position_drive_damping=1e4
  # never actually reach the authored joints on this Isaac Sim version -- every
  # joint came out as type=acceleration, stiffness=625, damping=0 regardless, a
  # fully undamped spring that was the real, dominant cause of the CR5's "swings
  # back and forth at the start/stop of a move" bug. stiffness=625 == a natural
  # frequency of 25 rad/s in acceleration-mode drives (stiffness is rad^2/s^2
  # here, not torque/rad); keeping that (it's what the importer already used,
  # and gives a reasonably fast teleop response) and setting damping=50 is
  # exactly critically-damped (zeta=1) for that same omega_n:
  # damping = 2*zeta*omega_n = 2*1*25 = 50. Confirmed via headless per-joint
  # planned-vs-measured velocity logging: this removed both the violent initial
  # kick (was ~10x the commanded velocity at the very first waypoint) and the
  # growing end-of-motion divergence (was still ~0.5-0.6 rad/s on the wrist
  # joints once the plan had already ramped down to ~0).
  joint_drive:
    stiffness: 625.0
    damping: 50.0

  # GRIPPER ADDITION: PGC-140 open/close teleop control + its own drive
  # tuning (scripts/import_cr5.py's tune_gripper_drive(), wired up from
  # scripts/build_scene.py). Deliberately its own sub-block, NOT sharing
  # joint_drive above -- the gripper's prismatic joint is a completely
  # different mass/stiffness regime than the arm's revolute joints, so
  # there's no reason to expect the arm's stiffness=625.0/damping=50.0
  # (critically-damped for THAT joint's own importer-assigned stiffness)
  # applies here at all.
  gripper:
    # pgc140_finger1_joint's own URDF <limit lower="0" upper="0.025" .../>
    # (robots/pgc140/urdf/pgc140_robot.urdf) -- full stroke, not narrowed
    # to any particular part's width yet (unlike scripts/mefron_lib/
    # config.py's GRIPPER_OPEN_POSITION/GRIPPER_CLOSED_POSITION, which
    # were bracketed to finger_print_scanner's own measured width -- no
    # equivalent part-specific measurement exists for this branch yet).
    #
    # CONFIRMED LIVE which extreme is actually which: directly computed
    # each finger link's world position at both q=0.0 and q=0.025 (the
    # joint's own axis, in pgc140_base_link's frame, points inward toward
    # the gripper's centerline as q increases -- both fingers converge from
    # ~30mm off-centerline at q=0.0 to ~13mm at q=0.025). So q=0.0 is OPEN
    # and q=0.025 is CLOSED -- opposite of the URDF's raw lower/upper naming,
    # and opposite of an earlier draft of this file, which had these two
    # values swapped (and, via cr5.yml's retract_config/lock_joints, was
    # silently locking the gripper CLOSED by default during planning).
    open_position: 0.0
    closed_position: 0.025
    # Rate (m/s) the commanded gripper position is ramped toward open/
    # closed, instead of stepping instantly -- same idea and same starting
    # value as scripts/mefron_lib/config.py's GRIPPER_CLOSE_SPEED, not yet
    # independently tuned for this gripper's own (unconfirmed) drive
    # response.
    close_speed: 0.02
    # NOT pre-derived by analogy to the arm's critically-damped
    # stiffness=625.0/damping=50.0 -- confirm empirically (per-joint
    # planned-vs-measured logging, same method that found the arm's own
    # damping=0 bug) whether these placeholder values are even in the
    # right regime before trusting them; acceleration-mode drives divide
    # out effective inertia, so mass alone doesn't tell us what number
    # belongs here. Not yet verified live (no Isaac Sim/GPU in this dev
    # environment).
    joint_drive:
      stiffness: 625.0
      damping: 50.0
    # Bounded contact force -- a genuinely new concern the bare arm never
    # needed (position tracking only, never touched anything). Set to
    # PGC-140's own URDF effort="140" ceiling (matches the datasheet's
    # "up to 140N" per-jaw rating) as a first-draft upper bound, not a
    # value chosen for any particular part's fragility -- lower this once
    # a real part is actually being grasped.
    max_force: 140.0

  # TEMPORARY: mount cuRobo's own bundled, well-tuned Franka Panda instead
  # of the CR5, to validate the whole pipeline (mount pose, pedestal,
  # teleop via examples/curobo_reference/motion_gen_reacher.py, cuRobo
  # motion-gen) before trusting the CR5's own not-yet-verified kinematics
  # config (see configs/curobo/cr5.yml's KNOWN GAP note). Remove this block
  # (or set enabled: false) to revert to importing the CR5's own URDF at
  # robots/cr5/urdf/cr5_robot.urdf with its own drive tuning.
  #
  # urdf_relative_path is resolved at runtime via
  # curobo.util_file.get_assets_path() + this path -- NOT a path in this
  # repo. drive_strength/position_drive_damping are cuRobo's own tuned
  # values for the Franka (see their examples/isaac_sim/helper.py), not a
  # guess -- unlike the CR5's, which exist only to work around its URDF's
  # degenerate effort="0" velocity="0" joints. motion_gen_robot_cfg is
  # cuRobo's own bundled robot-config filename (resolved via
  # curobo.util_file.get_robot_configs_path()) for building the matching
  # MotionGen -- keeps the Isaac Sim import and the cuRobo kinematics using
  # the same robot while this override is active.
  robot_override:
    enabled: false
    urdf_relative_path: robot/franka_description/franka_panda.urdf
    default_drive_strength: 1047.19751
    default_position_drive_damping: 52.35988
    motion_gen_robot_cfg: franka.yml

teleop_target:
  # Draggable target the operator moves in the GUI viewport; the mounted
  # robot (CR5 or, temporarily, the Franka override above) follows it via
  # cuRobo's MotionGen.plan_single(), matching
  # examples/curobo_reference/motion_gen_reacher.py's pattern (see that
  # file's own do-not-modify note in CLAUDE.md -- this is our own,
  # config-driven adaptation of the same idea, not a copy of that script).
  #
  # Rather than a plain colored cuboid (the reference example's own target),
  # this is a *ghost copy of the robot's actual end-effector visual mesh*
  # (see build_teleop_target() in scripts/build_scene.py) -- confirmed live
  # that CopyPrim correctly preserves the instanceable mesh reference
  # (Isaac Sim's URDF importer marks per-link visual meshes as
  # `instanceable`, sharing one prototype across links that reuse the same
  # geometry; plain Usd.PrimRange traversal doesn't show this content by
  # default, which is why the copy has to be verified with
  # Usd.TraverseInstanceProxies() rather than assumed).
  prim_path: /World/target

  # World position (meters). Confirmed live: cuRobo's kinematics/IK operate
  # in the robot's own base-link frame (run_teleop_loop transforms the
  # dragged world pose into that frame via Pose.compute_local_pose() before
  # calling plan_single()), NOT USD world space -- unlike
  # examples/curobo_reference/motion_gen_reacher.py, whose robot happens to
  # sit at the world origin, so the two frames are numerically identical
  # there.
  #
  # CR5-derived (replacing an earlier Franka-derived value): computed via
  # CudaRobotModel(cr5.yml).get_state(retract_config).ee_pose, composed with
  # cr5_mount.position/orientation_wxyz via curobo.types.math.Pose.multiply()
  # -- see docs/mefron-history.md-style derivation in the dobot branch's own
  # notes. The previous value here ([1.5605, -3.3400, 1.3604],
  # [0.0, 1.0, 0.0, 0.0]) was derived while cr5_mount.robot_override was
  # enabled (Franka mounted) -- confirmed live it reliably failed IK
  # (MotionGenStatus.IK_FAIL) once the real CR5 was mounted instead, since
  # the CR5's own retract_config end-effector pose sits nowhere near where
  # the Franka's did. This value is the CR5's own retract_config end-
  # effector pose (a trivial identity plan, guaranteed reachable) converted
  # to world frame via cr5_mount.position, so the ghost target starts out
  # exactly coincident with the real end-effector.
  #
  # Recomputed a second time after cr5.yml's retract_config itself changed
  # (all-zero -> bent-elbow, see that file's own comment -- the all-zero
  # pose was a severe kinematic singularity) -- this position/orientation
  # is FK at the new retract_config, not the old all-zero one.
  #
  # GRIPPER ADDITION -- RE-VERIFIED LIVE, still numerically correct: after
  # configs/curobo/cr5.yml's ee_link moved from "Link6" to
  # "pgc140_base_link", re-ran the exact FK computation this comment
  # documents (CudaRobotModel(cr5.yml).get_state(retract_config).ee_pose,
  # composed with cr5_mount.position/orientation_wxyz) against the NEW
  # ee_link, and got back these exact same numbers -- because
  # scripts/generate_cr5_pgc140_urdf.py's Link6-to-gripper mount joint is
  # currently an identity transform (MOUNT_ORIGIN_XYZ/_RPY = "0 0 0"),
  # pgc140_base_link is geometrically coincident with where Link6 used to
  # be. This will go stale again the moment that mount transform is
  # updated to a real, non-zero offset (once visually confirmed in the
  # GUI) -- recompute at that point, using the same command, don't assume
  # it's still correct just because it was here.
  position: [1.5630276203155518, -3.5731465816497803, 1.7584779262542725]
  # CR5 ee_link's (now pgc140_base_link) own retract-config orientation --
  # NOT the same "point straight down" convention the old Franka-derived
  # value used (examples/curobo_reference/motion_gen_reacher.py's default
  # goal orientation doesn't apply here; that reference robot's ee_link
  # frame convention differs from the CR5 URDF's Link6, and by extension
  # pgc140_base_link while it's mounted at an identity offset from it).
  # Same re-verification note as position above -- still numerically
  # correct today, will go stale once the mount transform stops being
  # identity.
  orientation_wxyz: [0.2753560245037079, -0.07059486210346222, 0.6512897610664368, -0.703574538230896]

  # Debounce thresholds gating when plan_single() actually runs (see
  # run_teleop_loop() in scripts/build_scene.py) -- ported verbatim from
  # examples/curobo_reference/motion_gen_reacher.py's own hardcoded
  # constants (cuRobo's own tuned defaults, not values re-derived for this
  # robot specifically). Kept as named config values so they're tunable
  # without a code change if dragging feels laggy or over-eager once tested
  # live in the GUI.
  pose_delta_threshold: 1.0e-3
  static_joint_velocity_threshold: 0.5

  # Derate trajectory optimization + re-time the result, instead of running
  # cuRobo's own natural (fastest-feasible) plan straight through the CR5's
  # placeholder drive gains (import_cr5.py's default_drive_strength=1e5/
  # default_position_drive_damping=1e4 -- "a workaround for degenerate URDF
  # joints... not a generally correct value", see that file's own comment)
  # and placeholder cspace limits (configs/curobo/cr5.yml's max_jerk=500.0/
  # max_acceleration=15.0 -- "not sourced from the CR5 datasheet yet").
  # Confirmed live (scripts/test_teleop_headless.py with temporary
  # planned-vs-measured velocity logging) that without this, the *planned*
  # trajectory is a clean trapezoid peaking exactly at the URDF's 3.14 rad/s
  # joint-velocity ceiling, but the *measured* joint velocity overshoots it
  # by ~10x at the very first waypoint (0.11 planned vs. 1.09 measured) and,
  # symmetrically, is still measured at 0.64 rad/s once the plan has already
  # ramped down to 0.02 at the last waypoint -- that leftover momentum (no
  # longer being commanded once cmd_plan runs out) is what then has to swing
  # back to actually stop. Same knobs, same values as the one other teleop
  # loop in this repo already confirmed smooth (scripts/mefron_lib/config.py's
  # _TELEOP_VELOCITY_SCALE/_TELEOP_ACCELERATION_SCALE/_TELEOP_TIME_DILATION_FACTOR,
  # driving a Franka there instead) -- start here rather than hand-tuning the
  # CR5's own gains/limits blind.
  teleop_velocity_scale: 0.5
  teleop_acceleration_scale: 0.5
  teleop_time_dilation_factor: 0.3

assembly_parts:
  # Assembly parts for the robot to (eventually) pick/place -- SolidWorks
  # CAD, exported to STEP and converted to USD via Isaac Sim's bundled
  # CAD Converter extension (omni.kit.converter.cad). Source CAD files live
  # under the repo root ("mantra scanner/", user's own uploaded content,
  # not vendored/tracked project infrastructure) -- only referenced here by
  # path, same as factory.backdrop_usd.
  instances:
    - name: pcb_assembly
      # The _color_fixed copy, not the CAD Converter's raw output -- see
      # scripts/fix_cad_import_colors.py's own module comment for the real
      # color-space bug it corrects (STEP's sRGB COLOUR_RGB values written
      # verbatim into USD's linear-expected diffuseColor, unconverted).
      usd_path: "mantra scanner/STEP_Mantra_Scanner/PCB Assembly_color_fixed.usd"
      prim_path: /World/PCB_Assembly
      # NOT [0.001, 0.001, 0.001] -- correction from an earlier wrong
      # assumption here, caught by verifying instead of trusting it. The
      # STEP source declares SI_UNIT(.MILLI.,.METRE.) and the converted
      # USD's own metersPerUnit=0.001 matches it correctly (self-consistent,
      # not a conversion bug), and this scene is meters-native
      # (metersPerUnit=1.0, same as factory.backdrop_usd). The wrong
      # assumption was that USD/isaacsim.core.utils.stage.add_reference_to_
      # stage() never reconciles a metersPerUnit mismatch across a
      # reference, requiring a manual 1000x compensating scale here --
      # confirmed live that's false for this environment:
      # add_reference_to_stage() already yields the exact correct
      # real-world size (0.1055 x 0.12655 x 0.0186, matching the true
      # ~105mm x 126mm board) with NO scale applied at all, and
      # SingleXFormPrim.get_local_scale() reports [0.001, 0.001, 0.001] is
      # already being applied automatically. Adding another manual 0.001
      # here stacked on top of that, shrinking the part 1000x *too small*
      # instead. See factory.backdrop_usd's own x100-scale comment for a
      # case where a manual scale genuinely is needed (CopyPrim of a prim
      # already living under a scaled parent, not add_reference_to_stage of
      # a standalone file with its own metersPerUnit) -- the two are not
      # the same situation, despite both being cm/mm-vs-m mismatches.
      scale: [1.0, 1.0, 1.0]
      # World position (meters), placed flush on ErgoTable_1's top surface.
      # Confirmed live via UsdGeom.BBoxCache: ErgoTable_1's world bbox top
      # is z=1.2600, center xy=(2.2776, -3.2870); this part's own local
      # bbox (in its native mm units) has its lowest point 2.5mm *below*
      # its origin (small mounting-pin protrusions), i.e. -0.0025m once
      # scaled -- so origin z = table_top_z - part_local_min_z = 1.2600 -
      # (-0.0025) = 1.2625 sits the part's actual lowest point exactly on
      # the table surface, not floating above or clipped through it.
      position: [2.2776, -3.2870, 1.2625]
      orientation_wxyz: [1.0, 0.0, 0.0, 0.0]
      # Dynamic rigid body (not kinematic/static): this is a part meant to
      # be picked up and moved by the robot, not a fixed prop like the
      # table/pedestal. build_assembly_parts() applies this via
      # omni.physx.scripts.utils.setRigidBody(), the same PhysX helper
      # behind the GUI's own Add > Physics > Rigid Body action -- confirmed
      # that action isn't reachable from this stage's right-click menu at
      # all (the physics UI extension's menu contribution isn't loaded
      # here), so this is set up in code instead, which also means it
      # survives a scene rebuild rather than being a one-off manual click.
      rigid_body: true
